stages:
  - build
  - test

variables:
  DEBIAN_FRONTEND: noninteractive
  BUILD_DIR: build

# ------------------------------------------------------------
# Shared setup for Debian Trixie jobs
# ------------------------------------------------------------
.before_debian_trixie: &before_debian_trixie
  before_script:
    - apt-get update -y
    - apt-get install -y --no-install-recommends \
        build-essential \
        cmake \
        ninja-build \
        pkg-config \
        git \
        ca-certificates
    - git config --global advice.detachedHead false

# ------------------------------------------------------------
# BUILD JOB
# ------------------------------------------------------------
build:
  stage: build
  image: debian:trixie
  <<: *before_debian_trixie
  script:
    - cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build --target all
  artifacts:
    paths:
      - build
    expire_in: 1 week

# ------------------------------------------------------------
# TEST JOB
# ------------------------------------------------------------
test:
  stage: test
  image: debian:trixie
  needs: ["build"]
  <<: *before_debian_trixie
  script:
    # Re-run configure so absolute paths inside CMakeCache.txt are valid
    - cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
    - cmake --build build --target fairlanes_tests
    - ./build/tests/fairlanes_tests
